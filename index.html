<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard Component</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#603010',
                        brandBg: '#fbf5f0',
                        cardBg: '#ffffff',
                    },
                    fontFamily: {
                        serif: ['Georgia', 'serif'],
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brandBg min-h-screen flex flex-col items-center p-4 md:p-8 font-sans text-stone-700">

    <div class="max-w-4xl w-full flex flex-col gap-6">
        <!-- BARIS ATAS -->
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 bg-cardBg p-4 rounded-2xl shadow-sm border border-stone-100">
            <h1 class="font-serif text-xl font-bold text-brand">My Finance Hub</h1>
            <button id="btn-login" class="bg-emerald-600 text-white text-xs font-semibold px-4 py-2 rounded-xl">⚡ Supabase Active</button>
        </div>

        <!-- AREA AI -->
        <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100 flex flex-col gap-3">
            <h3 class="font-serif font-semibold text-lg text-brand">AI Assistant Input</h3>
            <div class="flex gap-2">
                <input id="ai-input" type="text" placeholder="Ketik perintah..." class="flex-1 text-sm bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5">
                <button onclick="kirimAI()" class="bg-brand text-white text-sm font-semibold px-5 py-2.5 rounded-xl">Kirim</button>  
            </div>
            <div id="ai-response" class="mt-3 p-3 rounded-xl bg-stone-50 border border-stone-200 text-sm">AI siap...</div>
        </div>

        <!-- AREA: Riwayat Transaksi -->
        <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100 flex flex-col gap-4">
            <h3 class="font-serif font-semibold text-lg text-brand">Riwayat Transaksi</h3>
            <!-- Container ini akan diisi oleh JavaScript -->
            <div id="riwayat-transaksi-container" class="flex flex-col gap-3">
                <p class="text-stone-400 text-sm">Memuat data...</p>
            </div>
        </div>

        <!-- TATA LETAK 2 KOLOM (Disederhanakan) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
            <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100">
                <h2 class="font-serif text-2xl font-semibold text-brand mb-4">Financial Overview</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-stone-50 rounded-2xl p-4 text-center">Income: <div id="total-income" class="font-bold">$0</div></div>
                    <div class="bg-stone-50 rounded-2xl p-4 text-center">Expenses: <div id="total-expenses" class="font-bold">$0</div></div>
                </div>
            </div>
            
            <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100">
                <h2 class="font-serif text-2xl font-semibold text-brand mb-4">Financial Notes</h2>
                <div class="flex flex-col gap-2">
                    <a href="uang-pribadi.html" class="flex justify-between p-3 bg-stone-50 rounded-xl"><span>💼 Pribadi</span> <span id="nominal-row-1">Rp--</span></a>
                    <a href="saham.html" class="flex justify-between p-3 bg-stone-50 rounded-xl"><span>📈 Saham</span> <span id="nominal-row-2">Rp--</span></a>
                    <a href="usaha.html" class="flex justify-between p-3 bg-stone-50 rounded-xl"><span>🏪 Usaha</span> <span id="nominal-row-3">Rp--</span></a>
                </div>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = 'https://hjexgyqmyskgtgwpnufg.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_NejqNnFYxIhUSanm4yd09A_CWFbPXkJ';
        const supaClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // FUNGSI AI
        async function kirimAI() {
            const input = document.getElementById("ai-input");
            const output = document.getElementById("ai-response");
            if (!input.value.trim()) return;
            output.innerText = "Sedang berpikir...";
            try {
                const response = await fetch("https://prison-tiles-locally-relevant.trycloudflare.com/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: input.value })
                });
                const data = await response.json();
                output.innerText = data.response;
            } catch (err) { output.innerText = "Gagal: " + err.message; }
        }

        // FUNGSI RIWAYAT
        async function muatRiwayatTransaksi() {
            const container = document.getElementById('riwayat-transaksi-container');
            try {
                const [resPribadi, resSaham, resUsaha] = await Promise.all([
                    supaClient.from('uang_pribadi').select('date, nama, total_harga, transaksi'),
                    supaClient.from('saham').select('date, nama_saham, total_harga, transaksi'),
                    supaClient.from('usaha').select('date, nama_barang, total_harga, transaksi')
                ]);

                let semuaData = [];
                if(resPribadi.data) semuaData.push(...resPribadi.data.map(d => ({...d, nama: d.nama, source: 'Pribadi'})));
                if(resSaham.data) semuaData.push(...resSaham.data.map(d => ({...d, nama: d.nama_saham, source: 'Saham'})));
                if(resUsaha.data) semuaData.push(...resUsaha.data.map(d => ({...d, nama: d.nama_barang, source: 'Usaha'})));

                container.innerHTML = semuaData.map(item => `
                    <div class="flex items-center justify-between p-3 bg-stone-50 rounded-xl border border-stone-100">
                        <div><h4 class="text-sm font-semibold">${item.nama}</h4><p class="text-[10px] text-stone-400">${item.date} • ${item.source}</p></div>
                        <span class="text-sm font-bold">Rp${item.total_harga.toLocaleString()}</span>
                    </div>
                `).join('');
            } catch (err) { container.innerHTML = "Gagal memuat data."; }
        }

        // FUNGSI DATA MURNI
        async function muatDataMurni() {
            const { data } = await supaClient.from('catatan_keuangan').select('*');
            if (data) {
                data.forEach(row => {
                    const el = document.getElementById('nominal-row-' + (data.indexOf(row)+1));
                    if(el) el.innerText = row.deskripsi;
                });
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            muatRiwayatTransaksi();
            muatDataMurni();
        });
    </script>
</body>
</html>
