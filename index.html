<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard Component</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#603010',
                        brandBg: '#fbf5f0',
                        cardBg: '#ffffff',
                    },
                    fontFamily: {
                        serif: ['Georgia', 'serif'],
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brandBg min-h-screen flex flex-col items-center p-4 md:p-8 font-sans text-stone-700">

    <div class="max-w-4xl w-full flex flex-col gap-6">
        <!-- BARIS ATAS -->
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 bg-cardBg p-4 rounded-2xl shadow-sm border border-stone-100">
            <h1 class="font-serif text-xl font-bold text-brand">My Finance Hub</h1>
            <button class="bg-emerald-600 text-white text-xs font-semibold px-4 py-2 rounded-xl">⚡ Supabase Active</button>
        </div>

        <!-- AREA: AI Financial Assistant -->
        <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100 flex flex-col gap-4">
            <h3 class="font-serif font-semibold text-lg text-brand">AI Financial Assistant</h3>
            <div id="ai-response-container" class="p-4 bg-stone-50 rounded-2xl border border-stone-100 min-h-[100px] text-sm text-stone-600 italic">
                Tanyakan sesuatu tentang keuangan Anda...
            </div>
            <div class="flex gap-2">
                <input type="text" id="ai-input" placeholder="Tanya soal saldo atau transaksi..." class="flex-1 p-3 rounded-xl border border-stone-200 text-sm focus:outline-none focus:ring-2 focus:ring-brand">
                <button onclick="kirimKeAI()" class="bg-brand text-white px-6 py-2 rounded-xl text-sm font-semibold hover:bg-stone-800 transition">Tanya</button>
            </div>
        </div>

        <!-- AREA: Riwayat Transaksi -->
        <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100 flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <h3 class="font-serif font-semibold text-lg text-brand">Riwayat Transaksi</h3>
            </div>
            <div id="riwayat-transaksi-container" class="flex flex-col gap-3">
                <p class="text-stone-400 text-sm italic">Memuat data...</p>
            </div>
        </div>

        <!-- TATA LETAK 2 KOLOM: KALENDER & NOTES -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
            <!-- KIRI: Kalender -->
            <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-serif text-xl font-semibold text-brand" id="kalender-bulan-tahun">Bulan Tahun</h2>
                    <div class="flex gap-2">
                        <button onclick="ubahBulan(-1)" class="p-1 px-3 hover:bg-stone-100 rounded-lg">◀</button>
                        <button onclick="ubahBulan(1)" class="p-1 px-3 hover:bg-stone-100 rounded-lg">▶</button>
                    </div>
                </div>
                <div id="grid-kalender" class="grid grid-cols-7 gap-1 text-center text-xs">
                    <div class="font-bold text-stone-400">Min</div><div class="font-bold text-stone-400">Sen</div>
                    <div class="font-bold text-stone-400">Sel</div><div class="font-bold text-stone-400">Rab</div>
                    <div class="font-bold text-stone-400">Kam</div><div class="font-bold text-stone-400">Jum</div>
                    <div class="font-bold text-stone-400">Sab</div>
                </div>
            </div>

            <!-- KANAN: Financial Notes -->
            <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100 flex flex-col">
                <h2 class="font-serif text-xl font-semibold text-brand mb-4">Financial Notes</h2>
                <div class="flex flex-col gap-2">
                    <a href="uang-pribadi.html" class="flex justify-between p-3 rounded-xl hover:bg-stone-50 transition border border-stone-100">
                        <span class="text-sm font-semibold">💼 Pribadi</span>
                        <span id="nominal-pribadi" class="text-sm font-bold">Memuat...</span>
                    </a>
                    <a href="saham.html" class="flex justify-between p-3 rounded-xl hover:bg-stone-50 transition border border-stone-100">
                        <span class="text-sm font-semibold">📈 Saham</span>
                        <span id="nominal-saham" class="text-sm font-bold">Memuat...</span>
                    </a>
                    <a href="usaha.html" class="flex justify-between p-3 rounded-xl hover:bg-stone-50 transition border border-stone-100">
                        <span class="text-sm font-semibold">🏪 Usaha</span>
                        <span id="nominal-usaha" class="text-sm font-bold">Memuat...</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL EDIT JADWAL -->
    <div id="modal-jadwal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-xl">
            <h3 id="modal-tanggal" class="font-bold text-lg mb-2">Tanggal</h3>
            <textarea id="input-jadwal" class="w-full h-24 p-2 border rounded-lg mb-4 text-sm" placeholder="Tulis jadwal..."></textarea>
            <div class="flex gap-2">
                <button onclick="tutupModal()" class="flex-1 p-2 bg-stone-100 rounded-xl">Batal</button>
                <button onclick="simpanJadwal()" class="flex-1 p-2 bg-brand text-white rounded-xl">Simpan</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <script>
        const supaClient = supabase.createClient('https://hjexgyqmyskgtgwpnufg.supabase.co', 'sb_publishable_NejqNnFYxIhUSanm4yd09A_CWFbPXkJ');
        let tglAktif = new Date();
        let tglDipilih = "";

        // Kalender Logic
        function renderKalender() {
            const grid = document.getElementById('grid-kalender');
            const label = document.getElementById('kalender-bulan-tahun');
            grid.innerHTML = '<div class="font-bold text-stone-400">Min</div><div class="font-bold text-stone-400">Sen</div><div class="font-bold text-stone-400">Sel</div><div class="font-bold text-stone-400">Rab</div><div class="font-bold text-stone-400">Kam</div><div class="font-bold text-stone-400">Jum</div><div class="font-bold text-stone-400">Sab</div>';
            
            const bln = tglAktif.getMonth(), thn = tglAktif.getFullYear();
            label.innerText = tglAktif.toLocaleString('id-ID', { month: 'long', year: 'numeric' });
            
            const firstDay = new Date(thn, bln, 1).getDay();
            const daysInMonth = new Date(thn, bln + 1, 0).getDate();
            
            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=daysInMonth; d++) {
                const div = document.createElement('div');
                div.className = "p-2 rounded-lg hover:bg-brand hover:text-white cursor-pointer";
                div.innerText = d;
                div.onclick = () => bukaModal(d, bln + 1, thn);
                grid.appendChild(div);
            }
        }

        function ubahBulan(n) { tglAktif.setMonth(tglAktif.getMonth() + n); renderKalender(); }
        function bukaModal(d, m, y) {
            tglDipilih = `${d}-${m}-${y}`;
            document.getElementById('modal-tanggal').innerText = `Jadwal: ${d}/${m}/${y}`;
            document.getElementById('input-jadwal').value = localStorage.getItem(tglDipilih) || "";
            document.getElementById('modal-jadwal').classList.remove('hidden');
        }
        function simpanJadwal() { localStorage.setItem(tglDipilih, document.getElementById('input-jadwal').value); tutupModal(); }
        function tutupModal() { document.getElementById('modal-jadwal').classList.add('hidden'); }

        // Fetch Data
        async function muatData() {
            // Gabungan fungsi muatRiwayat dan muatCatatan
            renderKalender();
            // ... (tambahkan fungsi fetch Supabase Anda di sini)
        }
        
        window.onload = muatData;
    </script>
</body>
</html>
