        // Fungsi Catatan Keuangan
        // Ganti bagian isi fungsi muatCatatanKeuangan dengan kode ini:

    async function muatCatatanKeuangan() {
        try {
            const { data, error } = await supaClient.from('catatan_keuangan').select('judul, deskripsi');
            if (error) throw error;5 rounded-xl border border-transparent hover:
        
            if (data) {
                data.forEach(item => {
                    // Pastikan deskripsi diubah menjadi angka sebelum diformat
                    const nominal = parseInt(item.deskripsi.replace(/[^0-9]/g, ''));
                    const formattedNominal = !isNaN(nominal) 
                        ? "Rp" + nominal.toLocaleString('id-ID') 
                        : item.deskripsi; // Fallback jika bukan angka

                    const j = item.judul.toLowerCase();
                    if (j.includes('uang_pribadi')) {
                        document.getElementById('nominal-pribadi').innerText = formattedNominal;
                    } else if (j.includes('saham')) {
                        document.getElementById('nominal-saham').innerText = formattedNominal;
                    } else if (j.includes('usaha')) {
                        document.getElementById('nominal-usaha').innerText = formattedNominal;
                    }
                });
            }
        } catch (err) {
            console.error("Gagal memuat catatan:", err);
        }
    }
        window.addEventListener('DOMContentLoaded', () => {
            muatRiwayatTransaksi();
            muatCatatanKeuangan();

        });

    </script>
    <script>
    // Tempat menaruh API Key Anda
async function kirimKeAI() {
    const input = document.getElementById("ai-input").value;
    const container = document.getElementById("ai-response-container");

    if (!input) return;

    container.innerText = "Memproses melalui Ollama...";

    try {
        const response = await fetch("http://127.0.0.1:8000/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                prompt: input
            })
        });

        const result = await response.json();

        container.innerText = result.response;

    } catch (error) {
        container.innerText = "Gagal menghubungi AI.";
        console.error("AI Error:", error);
    }
}
         </script>
       
         <script>
             // java kalender
let tanggalSekarang = new Date();

function renderKalender() {
    const grid = document.getElementById('grid-kalender');
    const label = document.getElementById('kalender-bulan-tahun');
    
    // Reset grid (sisakan header hari)
    grid.innerHTML = '<div class="text-stone-400 font-bold">Min</div><div class="text-stone-400 font-bold">Sen</div><div class="text-stone-400 font-bold">Sel</div><div class="text-stone-400 font-bold">Rab</div><div class="text-stone-400 font-bold">Kam</div><div class="text-stone-400 font-bold">Jum</div><div class="text-stone-400 font-bold">Sab</div>';
    
    const bulan = tanggalSekarang.getMonth();
    const tahun = tanggalSekarang.getFullYear();
    label.innerText = tanggalSekarang.toLocaleString('id-ID', { month: 'long', year: 'numeric' });

    const hariPertama = new Date(tahun, bulan, 1).getDay();
    const jumlahHari = new Date(tahun, bulan + 1, 0).getDate();

    // Isi hari kosong sebelum tanggal 1
    for (let i = 0; i < hariPertama; i++) grid.appendChild(document.createElement('div'));

    // Isi tanggal
    for (let d = 1; d <= jumlahHari; d++) {
        const div = document.createElement('div');
        div.className = "p-2 rounded-lg hover:bg-stone-100 cursor-pointer text-stone-700";
        div.innerText = d;
        div.onclick = () => bukaModal(d, bulan + 1, tahun);
        grid.appendChild(div);
    }
}

function ubahBulan(n) {
    tanggalSekarang.setMonth(tanggalSekarang.getMonth() + n);
    renderKalender();
}

function bukaModal(d, m, y) {
    document.getElementById('modal-tanggal').innerText = `${d}/${m}/${y}`;
    document.getElementById('modal-jadwal').classList.remove('hidden');
}

function tutupModal() {
    document.getElementById('modal-jadwal').classList.add('hidden');
}

// Jalankan saat load
renderKalender();
// popup edit
let selectedDate = "";

function bukaModal(d, m, y) {
    selectedDate = `${d}-${m}-${y}`;
    document.getElementById('modal-tanggal').innerText = `Jadwal: ${d}/${m}/${y}`;
    
    // Load jadwal lama jika ada
    const existing = localStorage.getItem(`jadwal_${selectedDate}`) || "";
    document.getElementById('input-jadwal').value = existing;
    
    document.getElementById('modal-jadwal').classList.remove('hidden');
}

function simpanJadwal() {
    const teks = document.getElementById('input-jadwal').value;
    localStorage.setItem(`jadwal_${selectedDate}`, teks);
    alert("Jadwal disimpan!");
    tutupModal();
}

function tutupModal() {
    document.getElementById('modal-jadwal').classList.add('hidden');
}
             </script>
