<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard Component</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#603010', brandBg: '#fbf5f0', cardBg: '#ffffff' },
                    fontFamily: { serif: ['Georgia', 'serif'], sans: ['Inter', 'ui-sans-serif', 'system-ui'] }
                }
            }
        }
    </script>
</head>
<body class="bg-brandBg min-h-screen flex flex-col items-center p-4 md:p-8 font-sans text-stone-700">

    <div class="max-w-4xl w-full flex flex-col gap-6">
        <!-- (Bagian UI Header & Chat AI tetap sama seperti sebelumnya...) -->
        <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100 flex flex-col gap-3">
            <h3 class="font-serif font-semibold text-lg text-brand">AI Assistant Input</h3>
            <div class="flex gap-2">
                <input id="ai-input" type="text" class="flex-1 text-sm bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5" placeholder="Ketik perintah...">
                <button onclick="kirimAI()" class="bg-brand text-white text-sm px-5 py-2.5 rounded-xl">Kirim</button>
            </div>
            <div id="ai-response" class="mt-3 p-3 rounded-xl bg-stone-50 border border-stone-200 text-sm">AI siap...</div>
        </div>

        <!-- Container Riwayat yang Dibenahi -->
        <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100 flex flex-col gap-4">
            <h3 class="font-serif font-semibold text-lg text-brand">Riwayat Transaksi</h3>
            <div id="riwayat-transaksi-container" class="flex flex-col gap-3">
                <p class="text-xs text-stone-400">Memuat transaksi...</p>
            </div>
        </div>
        
        <!-- Grid Overview & Notes (Tetap sama...) -->
    </div>

    <!-- SCRIPTS (Ditempatkan sebelum penutup body untuk performa optimal) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    
    <script>
        const SUPABASE_URL = 'https://hjexgyqmyskgtgwpnufg.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_NejqNnFYxIhUSanm4yd09A_CWFbPXkJ';
        const supaClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 1. Fungsi Kirim AI
        async function kirimAI() {
            const input = document.getElementById("ai-input");
            const output = document.getElementById("ai-response");
            if (!input.value.trim()) return;
            output.innerText = "Sedang berpikir...";
            try {
                const response = await fetch("https://prison-tiles-locally-relevant.trycloudflare.com/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: input.value.trim() })
                });
                const data = await response.json();
                output.innerText = data.response;
            } catch (err) {
                output.innerText = "Gagal terhubung ke AI: " + err.message;
            }
        }

        // 2. Muat Data Utama
        async function muatDataMurni() {
            try {
                const { data } = await supaClient.from('catatan_keuangan').select('*');
                if (data) {
                    data.forEach(row => {
                        const id = row.judul?.toLowerCase().trim();
                        if (document.getElementById(`judul-row-${id === 'uang_pribadi' ? '1' : id === 'saham' ? '2' : '3'}`)) {
                            document.getElementById(`judul-row-${id === 'uang_pribadi' ? '1' : id === 'saham' ? '2' : '3'}`).innerText = row.judul;
                            document.getElementById(`nominal-row-${id === 'uang_pribadi' ? '1' : id === 'saham' ? '2' : '3'}`).innerText = row.deskripsi;
                        }
                    });
                }
            } catch (err) { console.error(err); }
        }

        // 3. Muat Riwayat Transaksi
        async function muatRiwayatTransaksi() {
            const container = document.getElementById('riwayat-transaksi-container');
            try {
                const [resPribadi, resSaham, resUsaha] = await Promise.all([
                    supaClient.from('uang_pribadi').select('date, nama, total_harga, transaksi'),
                    supaClient.from('saham').select('date, nama_saham, total_harga, transaksi'),
                    supaClient.from('usaha').select('date, nama_barang, total_harga, transaksi')
                ]);

                // Gabung dan sortir data (Logika ringkas)
                const semuaData = [
                    ...(resPribadi.data || []).map(d => ({ date: d.date, nama: d.nama, total: d.total_harga, tipe: d.transaksi ? 'keluar' : 'masuk', source: 'Pribadi' })),
                    ...(resSaham.data || []).map(d => ({ date: d.date, nama: d.nama_saham, total: d.total_harga, tipe: d.transaksi ? 'jual' : 'beli', source: 'Saham' })),
                    ...(resUsaha.data || []).map(d => ({ date: d.date, nama: d.nama_barang, total: d.total_harga, tipe: d.transaksi ? 'beli' : 'jual', source: 'Usaha' }))
                ].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 3);

                container.innerHTML = semuaData.map(item => `
                    <div class="flex items-center justify-between p-3 bg-stone-50 rounded-xl border border-stone-100">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-xl bg-stone-100 flex items-center justify-center font-bold text-sm text-stone-600">${item.source[0]}</div>
                            <div>
                                <h4 class="text-sm font-semibold text-stone-800">${item.nama}</h4>
                                <p class="text-[10px] text-stone-400">${item.date} • ${item.source}</p>
                            </div>
                        </div>
                        <span class="text-sm font-bold ${['keluar', 'beli'].includes(item.tipe) ? 'text-red-600' : 'text-emerald-600'}">
                            ${['keluar', 'beli'].includes(item.tipe) ? '-' : '+'}Rp${(item.total || 0).toLocaleString()}
                        </span>
                    </div>
                `).join('');
            } catch (err) { container.innerHTML = '<p class="p-4 text-xs text-red-500">Gagal memuat data.</p>'; }
        }

        window.addEventListener('DOMContentLoaded', () => {
            muatDataMurni();
            muatRiwayatTransaksi();
        });
    </script>
</body>
</html>
