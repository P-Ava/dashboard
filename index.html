<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard Component</title>
    <!-- Tailwind CSS untuk styling yang cepat dan rapi -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#603010',
                        brandBg: '#fbf5f0',
                        cardBg: '#ffffff',
                    },
                    fontFamily: {
                        serif: ['Georgia', 'serif'],
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                    }
                }
            }
        }
    </script>
    <!-- Library Resmi Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // URL Supabase Anda sudah otomatis terisi di bawah ini
        const SUPABASE_URL = 'https://hjexgyqmyskgtgwpnufg.supabase.co';
        
        // PENTING: Ganti teks di bawah dengan anon/public key dari menu Project Settings -> API di Supabase Anda
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqZXhneXFteXNrZ3Rnd3BudWZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNjAwODIsImV4cCI6MjA5NzczNjA4Mn0.XkGT6Lka80KTAciRx-BA-KAYJx5r6KbDU9HH4c2j98A';
        
        // Inisialisasi Klien Supabase
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Ambil data otomatis saat website pertama kali dibuka
        window.addEventListener('load', function() {
            ambilCatatanDariSupabase();
        });

        // 1. Fungsi Mengambil (Read) Data dari Supabase ke Layar
        async function ambilCatatanDariSupabase() {
            const wadah = document.getElementById("lokasi-catatan");
            if (!wadah) return;
            
            // Ambil data dari tabel catatan_keuangan
            const { data, error } = await supabase
                .from('catatan_keuangan')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Gagal mengambil data:', error);
                wadah.innerHTML = `<p class="text-xs text-red-500 text-center py-4">Error: ${error.message}</p>`;
                return;
            }

            // Jika data kosong
            if (!data || data.length === 0) {
                wadah.innerHTML = `<p class="text-xs text-stone-400 text-center py-4">Belum ada catatan keuangan.</p>`;
                return;
            }

            // Bersihkan list bawaan, lalu ganti dengan data dari Supabase
            wadah.innerHTML = '';
            data.forEach(item => {
                const catatanBaru = document.createElement("div");
                catatanBaru.className = "flex items-start gap-4 pb-3 border-b border-stone-100";
                catatanBaru.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-orange-50 flex items-center justify-center text-brand shrink-0 text-xs">📌</div>
                    <div>
                        <h4 class="font-sans font-semibold text-sm text-stone-800">${item.judul}</h4>
                        <p class="text-xs text-stone-500">${item.deskripsi}</p>
                    </div>
                `;
                wadah.appendChild(catatanBaru);
            });
        }

        // 2. Fungsi Menambah (Create/Insert) Data Baru ke Supabase
        async function tambahCatatan() {
            const judul = prompt("Masukkan judul catatan baru:");
            if (!judul) return;
            
            const deskripsi = prompt("Masukkan deskripsi/detail catatan:");
            if (!deskripsi) return;

            // Simpan ke tabel Supabase
            const { error } = await supabase
                .from('catatan_keuangan')
                .insert([{ judul: judul, deskripsi: deskripsi }]);

            if (error) {
                alert('Gagal menyimpan ke Supabase: ' + error.message);
            } else {
                // Refresh data di layar jika sukses
                ambilCatatanDariSupabase();
            }
        }

        // 3. Fungsi Koneksi Supabase
        function handleSupabaseConnect() {
            alert("Terhubung dengan konfigurasi Supabase!");
            document.getElementById('btn-login').innerText = "⚡ Supabase Active";
            document.getElementById('btn-login').classList.add('bg-emerald-600');
        }
    </script>
</head>
<body class="bg-brandBg min-h-screen flex flex-col items-center p-4 md:p-8 font-sans text-stone-700">

    <!-- WRAPPER UTAMA -->
    <div class="max-w-4xl w-full flex flex-col gap-6">
        
        <!-- BARIS ATAS: Judul & Pencarian Lokal + Tombol Login -->
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 bg-cardBg p-4 rounded-2xl shadow-sm border border-stone-100">
            <h1 class="font-serif text-xl font-bold text-brand text-center sm:text-left">My Finance Hub</h1>
            <!-- Kolom Pencarian & Tombol Login -->
            <div class="flex flex-col sm:flex-row gap-2 w-full sm:w-auto items-center">
                <div class="relative w-full sm:w-64">
                    <input type="text" placeholder="Cari data lokal..." class="w-full text-sm bg-stone-50 text-stone-800 border border-stone-200 rounded-xl px-4 py-2 focus:outline-none focus:border-brand transition">
                </div>
                <!-- Tombol Koneksi Supabase -->
                <button id="btn-login" onclick="handleSupabaseConnect()" class="w-full sm:w-auto bg-stone-900 hover:bg-stone-800 text-white text-xs font-semibold px-4 py-2 rounded-xl flex items-center justify-center gap-2 transition duration-200">
                    ⚡ Connect Supabase
                </button>
            </div>
        </div>

        <!-- AREA TENGAH: AI Chat untuk Memasukkan Data -->
        <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100 flex flex-col gap-3">
            <div class="flex items-center gap-2 text-brand">
                <span class="text-xl">✨</span>
                <h3 class="font-serif font-semibold text-lg">AI Assistant Input</h3>
            </div>
            <p class="text-xs text-stone-500">Tuliskan data keuangan baru (misal: "Tambah income 5000" atau "Catat pengeluaran makan 150").</p>
            <div class="flex gap-2 mt-1">
                <input type="text" placeholder="Ketik perintah di sini untuk memasukkan data..." class="flex-1 text-sm bg-stone-50 text-stone-800 border border-stone-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-brand transition">
                <button class="bg-brand hover:bg-opacity-90 text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition duration-200">
                    Kirim
                </button>
            </div>
        </div>

        <!-- AREA TABEL & GRAFIK -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
            
            <!-- KARTU 1: Financial Overview -->
            <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="font-serif text-2xl font-semibold text-brand">Financial Overview</h2>
                        <span class="bg-orange-100 text-brand text-xs font-bold px-2.5 py-1 rounded-full">+45%</span>
                    </div>
                    <div class="relative w-full h-40 mb-6">
                        <svg viewBox="0 0 100 40" class="w-full h-full overflow-visible">
                            <defs>
                                <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" style="stop-color:#603010;stop-opacity:0.15" />
                                    <stop offset="100%" style="stop-color:#603010;stop-opacity:0.0" />
                                </linearGradient>
                            </defs>
                            <path d="M 0 35 L 15 28 L 35 22 L 55 20 L 75 14 L 100 8 L 100 40 L 0 40 Z" fill="url(#grad)" />
                            <path d="M 0 35 L 15 28 L 35 22 L 55 20 L 75 14 L 100 8" fill="none" stroke="#603010" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <div class="bg-stone-50 rounded-2xl p-4 text-center border border-stone-100">
                        <div class="text-xs text-stone-500 mb-1">● Income</div>
                        <div class="font-serif text-xl font-bold text-brand">$45,200</div>
                    </div>
                    <div class="bg-stone-50 rounded-2xl p-4 text-center border border-stone-100">
                        <div class="text-xs text-stone-500 mb-1">● Expenses</div>
                        <div class="font-serif text-xl font-bold text-brand">$12,300</div>
                    </div>
                </div>
            </div>

            <!-- KARTU 2: Financial Notes -->
            <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-serif text-2xl font-semibold text-brand">Financial Notes</h2>
                        <button onclick="tambahCatatan()" class="w-8 h-8 rounded-full bg-brandBg hover:bg-orange-100 text-brand font-bold text-lg flex items-center justify-center transition duration-200">
                            +
                        </button>
                    </div>
                    <!-- Wadah List Catatan dari Database -->
                    <div id="lokasi-catatan" class="space-y-4">
                        <p class="text-xs text-stone-400 text-center py-4">Memuat data dari database...</p>
                    </div>
                </div>
                <button class="w-full bg-brand hover:bg-opacity-90 text-white text-sm font-semibold py-3.5 px-4 rounded-xl transition duration-200 mt-6">
                    Learn income
                </button>
            </div>

        </div>
    </div>

</body>
</html>

</body>
</html>
