<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body class="bg-brandBg min-h-screen flex flex-col items-center p-4 md:p-8 font-sans text-stone-700">

    <div class="max-w-4xl w-full flex flex-col gap-6">
        <!-- BARIS ATAS -->

            <h1 class="font-serif text-xl font-bold text-brand">My Finance Hub</h1>
            <button class="bg-emerald-600 text-white text-xs font-semibold px-4 py-2 rounded-xl">⚡ Supabase Active</button>
        </div>
        <!-- AREA: AI Financial Assistant (Dipindah ke atas) -->
<div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100 flex flex-col gap-4">
    <h3 class="font-serif font-semibold text-lg text-brand">AI Financial Assistant</h3>
    
    <div id="ai-response-container" class="p-4 bg-stone-50 rounded-2xl border border-stone-100 min-h-[100px] text-sm text-stone-600 italic">
        Tanyakan sesuatu tentang keuangan Anda...
    </div>

    <div class="flex gap-2">
        <input type="text" id="ai-input" placeholder="Tanya soal saldo atau transaksi..."

</div>

        <!-- AREA: Riwayat Transaksi -->
        <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100 flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <h3 class="font-serif font-semibold text-lg text-brand">Riwayat Transaksi</h3>

            </div>
            <div id="riwayat-transaksi-container" class="flex flex-col gap-3">
                <p class="text-stone-400 text-sm italic">Memuat data...</p>
            </div>
        </div>

        <!-- TATA LETAK 2 KOLOM -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
            <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100">
                <h2 class="font-serif text-2xl font-semibold text-brand mb-6">Financial Overview</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-stone-50 rounded-2xl p-4 text-center border border-stone-100">
                        <div class="text-xs text-stone-500 mb-1">● Income</div>
                        <div class="font-serif text-xl font-bold text-brand">$45,200</div>
                    </div>
                    <div class="bg-stone-50 rounded-2xl p-4 text-center border border-stone-100">
                        <div class="text-xs text-stone-500 mb-1">● Expenses</div>
                        <div class="font-serif text-xl font-bold text-brand">$12,300</div>
                    </div>
                </div>
            </div>

            <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100 flex flex-col justify-between">
                <div>
                    <h2 class="font-serif text-2xl font-semibold text-brand mb-4">Financial Notes</h2>
                    <div class="flex flex-col gap-1.5">
                        <a href="uang-pribadi.html" class="flex items-center justify-between p-2.5 rounded-xl border border-transparent hover:bg-stone-100/60 transition group">
                            <span class="text-sm font-semibold text-stone-800 group-hover:text-brand">💼 Pribadi (Bank)</span>
                            <span id="nominal-pribadi" class="text-sm font-bold text-stone-800">Memuat...</span>
                        </a>
                        <a href="saham.html" class="flex items-center justify-between p-2.5 rounded-xl border border-transparent hover:bg-stone-100/60 transition group">
                            <span class="text-sm font-semibold text-stone-800 group-hover:text-brand">📈 Saham (RDN)</span>
                            <span id="nominal-saham" class="text-sm font-bold text-stone-800">Memuat...</span>
                        </a>
                        <a href="usaha.html" class="flex items-center justify-between p-2.5 rounded-xl border border-transparent hover:bg-stone-100/60 transition group">
                            <span class="text-sm font-semibold text-stone-800 group-hover:text-brand">🏪 Usaha (RDN)</span>
                            <span id="nominal-usaha" class="text-sm font-bold text-stone-800">Memuat...</span>

    <!-- SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = 'https://hjexgyqmyskgtgwpnufg.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_NejqNnFYxIhUSanm4yd09A_CWFbPXkJ';
        const supaClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Fungsi Riwayat Transaksi
        async function muatRiwayatTransaksi() {
            const container = document.getElementById('riwayat-transaksi-container');
            try {
                const [p1, p2, p3] = await Promise.all([
                    supaClient.from('uang_pribadi').select('date, nama_barang, total_harga, transaksi'),
                    supaClient.from('saham').select('date, nama_saham, total_harga, transaksi'),
                    supaClient.from('usaha').select('date, nama_barang, total_harga, transaksi')
                ]);

                let semuaData = [
                    ...(p1.data || []).map(d => ({ date: d.date, nama: d.nama_barang, total: d.total_harga, source: 'Pribadi' })),
                    ...(p2.data || []).map(d => ({ date: d.date, nama: d.nama_saham, total: d.total_harga, source: 'Saham' })),
                    ...(p3.data || []).map(d => ({ date: d.date, nama: d.nama_barang, total: d.total_harga, source: 'Usaha' }))
                ];

                semuaData.sort((a, b) => new Date(b.date) - new Date(a.date));

                container.innerHTML = semuaData.slice(0, 3).map(item => `
                    <div class="flex items-center justify-between p-3 bg-stone-50 rounded-xl border border-stone-100">
                        <div>
                            <h4 class="text-sm font-semibold text-stone-800">${item.nama}</h4>
                            <p class="text-[10px] text-stone-400">${item.date} • ${item.source}</p>
                        </div>
                        <span class="text-sm font-bold text-stone-800">Rp${(item.total || 0).toLocaleString()}</span>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = `<p class="text-red-500 text-sm">Gagal memuat data.</p>`;
            }
                                console.log(p1.data, p1.error);
                    console.log(p2.data, p2.error);
                    console.log(p3.data, p3.error);
        }

        // Fungsi Catatan Keuangan
        // Ganti bagian isi fungsi muatCatatanKeuangan dengan kode ini:

    async function muatCatatanKeuangan() {
        try {
            const { data, error } = await supaClient.from('catatan_keuangan').select('judul, deskripsi');
            if (error) throw error;
        
            if (data) {
                data.forEach(item => {
                    // Pastikan deskripsi diubah menjadi angka sebelum diformat
                    const nominal = parseInt(item.deskripsi.replace(/[^0-9]/g, ''));
                    const formattedNominal = !isNaN(nominal) 
                        ? "Rp" + nominal.toLocaleString('id-ID') 
                        : item.deskripsi; // Fallback jika bukan angka

                    const j = item.judul.toLowerCase();
                    if (j.includes('uang_pribadi')) {
                        document.getElementById('nominal-pribadi').innerText = formattedNominal;
                    } else if (j.includes('saham')) {
                        document.getElementById('nominal-saham').innerText = formattedNominal;
                    } else if (j.includes('usaha')) {
                        document.getElementById('nominal-usaha').innerText = formattedNominal;
                    }
                });
            }
        } catch (err) {
            console.error("Gagal memuat catatan:", err);
        }
    }
        window.addEventListener('DOMContentLoaded', () => {
            muatRiwayatTransaksi();
            muatCatatanKeuangan();

        });

    </script>
    <script>
    // Tempat menaruh API Key Anda
async function kirimKeAI() {
    const input = document.getElementById("ai-input").value;
    const container = document.getElementById("ai-response-container");

    if (!input) return;

    container.innerText = "Memproses melalui Ollama...";

    try {
        const response = await fetch("http://127.0.0.1:8000/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                prompt: input
            })
        });

        const result = await response.json();

        container.innerText = result.response;

    } catch (error) {
        container.innerText = "Gagal menghubungi AI.";
        console.error("AI Error:", error);
    }
}
         </script>
</body>
</html>
