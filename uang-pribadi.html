<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rincian Uang Pribadi</title>
    <!-- Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#603010',
                        brandBg: '#fbf5f0',
                        cardBg: '#ffffff',
                    },
                    fontFamily: {
                        serif: ['Georgia', 'serif'],
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brandBg min-h-screen flex flex-col items-center p-4 md:p-8 font-sans text-stone-700">

    <!-- WRAPPER UTAMA -->
    <div class="max-w-4xl w-full flex flex-col gap-6">
        
        <!-- HEADER / NAVIGASI ATAS -->
        <div class="flex justify-between items-center bg-cardBg p-4 rounded-2xl shadow-sm border border-stone-100">
            <div class="flex items-center gap-3">
                <a href="index.html" class="p-2 rounded-xl bg-stone-50 hover:bg-stone-100 text-brand transition" title="Kembali ke Dashboard">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                </a>
                <div>
                    <h1 class="font-serif text-xl font-bold text-brand">Uang Pribadi</h1>
                    <p class="text-xs text-stone-400">Rincian mutasi langsung dari Supabase</p>
                </div>
            </div>
            
            <!-- Total Saldo Dinamis -->
            <div class="text-right">
                <span class="text-xs text-stone-400 font-medium">Total Saldo</span>
                <h2 id="total-saldo-pribadi" class="text-lg font-bold text-brand font-serif">Rp0</h2>
            </div>
        </div>

        <!-- KARTU UTAMA: TABEL TRANSAKSI -->
        <div class="bg-cardBg rounded-3xl p-6 shadow-sm border border-stone-100 flex flex-col gap-4">
            
            <!-- BAGIAN ATAS TABEL -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 border-b border-stone-100 pb-4">
                <div class="flex items-center gap-3">
                    <div>
                        <h3 class="font-serif font-semibold text-lg text-brand inline-block">Daftar Pengeluaran & Pemasukan</h3>
                        <p class="text-xs text-stone-400">Cari berdasarkan nama barang atau tanggal dalam satu kolom</p>
                    </div>
                    <!-- TOMBOL TAMBAH TRANSAKSI KECIL -->
                    <button onclick="bukaModal()" class="px-3 py-1.5 bg-brand text-white text-xs font-semibold rounded-xl hover:bg-stone-800 transition shadow-sm flex items-center gap-1 shrink-0">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                        Tambah
                    </button>
                </div>
                
                <!-- INPUT PENCARIAN GABUNGAN -->
                <div class="relative w-full sm:w-64">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <svg class="w-4 h-4 text-stone-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </span>
                    <input type="text" id="input-cari-gabungan" placeholder="Cari barang atau tanggal..." class="w-full text-xs bg-stone-50 text-stone-800 border border-stone-200 rounded-xl pl-9 pr-4 py-2 focus:outline-none focus:border-brand transition">
                </div>
            </div>

            <!-- RESPONSIVE TABLE CONTAINER -->
            <div class="overflow-x-auto rounded-2xl border border-stone-100">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-stone-50 text-stone-500 text-xs font-semibold uppercase tracking-wider border-b border-stone-100">
                            <th class="p-4">Nama Barang</th>
                            <th class="p-4">Jumlah</th>
                            <th class="p-4">Transaksi</th>
                            <th class="p-4 text-right">Harga</th>
                            <th class="p-4">Tanggal</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-body-supa" class="divide-y divide-stone-100 text-sm text-stone-600">
                        <tr>
                            <td colspan="5" class="p-4 text-center text-stone-400 animate-pulse">Memuat data dari Supabase...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- KETERANGAN BAWAH -->
            <div class="flex justify-between items-center text-xs text-stone-400 mt-2">
                <span id="keterangan-jumlah-supa">Menampilkan 0 catatan</span>
            </div>
        </div>
    </div>

    <!-- POPUP FORM MODAL (TAMBAH TRANSAKSI) -->
    <div id="modal-transaksi" class="fixed inset-0 bg-stone-900/40 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl max-w-md w-full p-6 shadow-xl border border-stone-100 flex flex-col gap-4 animate-in fade-in zoom-in-95 duration-150">
            <div class="flex justify-between items-center border-b border-stone-100 pb-3">
                <h3 class="font-serif font-bold text-lg text-brand">Tambah Transaksi Baru</h3>
                <button onclick="tutupModal()" class="text-stone-400 hover:text-stone-600 p-1 rounded-lg hover:bg-stone-50">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form id="form-tambah-supa" class="flex flex-col gap-3.5 text-xs text-stone-600">
                <div class="flex flex-col gap-1">
                    <label class="font-medium text-stone-500">Nama Barang</label>
                    <input type="text" id="form-nama" required placeholder="Contoh: Gaji Bulanan, Kopi" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-3 py-2 focus:outline-none focus:border-brand">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col gap-1">
                        <label class="font-medium text-stone-500">Jumlah</label>
                        <input type="number" id="form-jumlah" min="1" value="1" required class="w-full bg-stone-50 border border-stone-200 rounded-xl px-3 py-2 focus:outline-none focus:border-brand">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="font-medium text-stone-500">Jenis Transaksi</label>
                        <select id="form-transaksi" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-3 py-2 focus:outline-none focus:border-brand font-medium">
                            <option value="true" class="text-emerald-600 font-medium">Pemasukan (+)</option>
                            <option value="false" class="text-red-600 font-medium">Penjualan (-)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col gap-1">
                        <label class="font-medium text-stone-500">Harga (Rp)</label>
                        <input type="number" id="form-harga" min="0" required placeholder="0" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-3 py-2 focus:outline-none focus:border-brand">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="font-medium text-stone-500">Tanggal</label>
                        <input type="date" id="form-date" required class="w-full bg-stone-50 border border-stone-200 rounded-xl px-3 py-2 focus:outline-none focus:border-brand">
                    </div>
                </div>

                <div class="flex gap-2 justify-end pt-2 border-t border-stone-100 mt-2">
                    <button type="button" onclick="tutupModal()" class="px-4 py-2 rounded-xl bg-stone-100 hover:bg-stone-200 font-medium transition">Batal</button>
                    <button type="submit" class="px-4 py-2 rounded-xl bg-brand text-white font-semibold hover:bg-stone-800 transition shadow-sm">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <!-- LIBRARY & LOGIK SUPABASE MURNI -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = 'https://hjexgyqmyskgtgwpnufg.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_NejqNnFYxIhUSanm4yd09A_CWFbPXkJ';
        
        // Perbaikan Inisialisasi Klien Global agar CDN berjalan sempurna
        const supaClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let dataLokalUangPribadi = [];

        // FUNGSI UTAMA: AMBIL DATA
        async function ambilDataUangPribadi() {
            try {
                const { data, error } = await supaClient
                    .from('uang_pribadi')
                    .select('*')
                    .order('date', { ascending: false });

                if (error) throw error;

                dataLokalUangPribadi = data || [];
                renderTabel(dataLokalUangPribadi);
            } catch (err) {
                console.error('Gagal mengambil data:', err.message);
                document.getElementById('tabel-body-supa').innerHTML = `<tr><td colspan="5" class="p-4 text-center text-red-500 font-medium">Koneksi Supabase Gagal: ${err.message}</td></tr>`;
            }
        }

        // FUNGSI RENDER TABEL
        function renderTabel(dataArray) {
            const tbody = document.getElementById('tabel-body-supa');
            tbody.innerHTML = '';
            
            if (dataArray.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-stone-400">Tidak ada data yang cocok</td></tr>';
                document.getElementById('keterangan-jumlah-supa').innerText = 'Menampilkan 0 catatan';
                document.getElementById('total-saldo-pribadi').innerText = 'Rp0';
                return;
            }

            let akumulasiSaldo = 0;

            dataArray.forEach(row => {
                const namaBarang = row.nama_barang || 'Tanpa Nama';
                const jumlah = row.jumlah || 1;
                const harga = row.harga || 0;
                const tanggal = row.date || '-';
                const apakahPemasukan = row.transaksi === true;

                if (apakahPemasukan) {
                    akumulasiSaldo += (harga * jumlah);
                } else {
                    akumulasiSaldo -= (harga * jumlah);
                }

                const formatHarga = new Intl.NumberFormat('id-ID', { 
                    style: 'currency', 
                    currency: 'IDR', 
                    maximumFractionDigits: 0 
                }).format(harga);

                const tr = document.createElement('tr');
                tr.className = 'hover:bg-stone-50/50 transition';
                tr.innerHTML = `
                    <td class="p-4 font-medium text-stone-800">${namaBarang}</td>
                    <td class="p-4 text-stone-500">${jumlah}x</td>
                    <td class="p-4">
                        <span class="px-2.5 py-0.5 rounded-full text-[10px] font-semibold tracking-wide uppercase ${apakahPemasukan ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}">
                            ${apakahPemasukan ? 'Pemasukan' : 'Penjualan'}
                        </span>
                    </td>
                    <td class="p-4 text-right font-semibold ${apakahPemasukan ? 'text-emerald-600' : 'text-red-600'}">
                        ${apakahPemasukan ? '+' : '-'}${formatHarga}
                    </td>
                    <td class="p-4 text-stone-400 text-xs">${tanggal}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('total-saldo-pribadi').innerText = new Intl.NumberFormat('id-ID', { 
                style: 'currency', 
                currency: 'IDR', 
                maximumFractionDigits: 0 
            }).format(akumulasiSaldo);

            document.getElementById('keterangan-jumlah-supa').innerText = `Menampilkan ${dataArray.length} catatan ditemukan`;
        }

        // KONTROL MODAL / POPUP
        function bukaModal() {
            document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('modal-transaksi').classList.remove('hidden');
        }

        function tutupModal() {
            document.getElementById('form-tambah-supa').reset();
            document.getElementById('modal-transaksi').classList.add('hidden');
        }

        // FUNGSI SUBMIT INPUT DATA KE SUPABASE
        document.getElementById('form-tambah-supa').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const nama_barang = document.getElementById('form-nama').value.trim();
            const jumlah = parseInt(document.getElementById('form-jumlah').value);
            const transaksi = document.getElementById('form-transaksi').value === 'true';
            const harga = parseFloat(document.getElementById('form-harga').value);
            const date = document.getElementById('form-date').value;

            try {
                const { error } = await supaClient
                    .from('uang_pribadi')
                    .insert([{ nama_barang, jumlah, transaksi, harga, date }]);

                if (error) throw error;

                tutupModal();
                ambilDataUangPribadi(); // Muat ulang data tabel secara instan
            } catch (err) {
                alert('Gagal menyimpan ke Supabase: ' + err.message);
            }
        });

        // FILTER PENCARIAN GABUNGAN
        document.getElementById('input-cari-gabungan').addEventListener('input', function(e) {
            const kataKunci = e.target.value.toLowerCase().trim();
            const dataHasilFilter = dataLokalUangPribadi.filter(row => {
                const namaBarang = (row.nama_barang || '').toLowerCase();
                const tanggal = (row.date || '').toLowerCase();
                return namaBarang.includes(kataKunci) || tanggal.includes(kataKunci);
            });
            renderTabel(dataHasilFilter);
        });

        window.addEventListener('DOMContentLoaded', ambilDataUangPribadi);
    </script>
</body>
</html>
