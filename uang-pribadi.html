<!-- LOGIKA JAVASCRIPT & SUPABASE -->
    <script>
        const SUPABASE_URL = "https://hjexgyqmyskgtgwpnufg.supabase.co";
        const SUPABASE_KEY = "sb_publishable_NejqNnFYxIhUSanm4yd09A_CWFbPXkJ"; 
        
        const _supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
        let dataLokalRemot = [];
        let modeAksiAktif = false; 

        // AMBIL DATA UTAMA DARI SUPABASE
        async function ambilData() {
            if (!_supabase) {
                tampilkanPesanError("Supabase tidak terinisialisasi dengan benar.");
                return;
            }
            try {
                // Menggunakan 'date' huruf kecil sesuai standar database Anda
                const { data, error } = await _supabase
                    .from('catatan_keuangan')
                    .select('*')
                    .order('date', { ascending: false }); 

                if (error) throw error;
                dataLokalRemot = data || [];
                
                buatOpsiPilihanBulan();
                tampilkanTabel();
                hitungDanTampilkanStatistik();

            } catch (err) {
                console.error("Gagal sinkronisasi data:", err.message);
                tampilkanPesanError(`Gagal terhubung ke Supabase: ${err.message}. Pastikan nama kolom 'date' atau nama tabel 'catatan_keuangan' sudah sesuai di database.`);
            }
        }

        // Fungsi pembantu agar tidak blank putih jika terjadi error script
        function tampilkanPesanError(pesan) {
            const tbody = document.getElementById('tabel-body');
            if (tbody) {
                tbody.innerHTML = `
                    <tr><td colspan="6" class="px-6 py-8 text-center text-red-500 font-semibold">${pesan}</td></tr>
                `;
            }
        }

        // GENERATE DROP-DOWN BULAN SECARA OTOMATIS
        function buatOpsiPilihanBulan() {
            const selectBulan = document.getElementById('filter-bulan-stat');
            if (!selectBulan) return;
            const nilaiTerpilihSebelumnya = selectBulan.value;

            selectBulan.innerHTML = '<option value="semua">Semua Waktu</option>';

            const kumpulanBulan = new Set();
            const namaBulanIndo = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

            dataLokalRemot.forEach(row => {
                const tanggalRaw = row.date || row.DATE;
                if (tanggalRaw) { 
                    const objekTanggal = new Date(tanggalRaw);
                    if (!isNaN(objekTanggal)) {
                        const yyyy = objekTanggal.getFullYear();
                        const mm = String(objekTanggal.getMonth() + 1).padStart(2, '0');
                        kumpulanBulan.add(`${yyyy}-${mm}`);
                    }
                }
            });

            const susunanBulanSorted = Array.from(kumpulanBulan).sort().reverse();

            susunanBulanSorted.forEach(itemBlon => {
                const [tahun, bulanNum] = itemBlon.split('-');
                const namaBulan = namaBulanIndo[parseInt(bulanNum) - 1];
                
                const opsi = document.createElement('option');
                opsi.value = itemBlon;
                opsi.textContent = `${namaBulan} ${tahun}`;
                selectBulan.appendChild(opsi);
            });

            if (Array.from(selectBulan.options).some(o => o.value === nilaiTerpilihSebelumnya)) {
                selectBulan.value = nilaiTerpilihSebelumnya;
            }
        }

        // HITUNG STATISTIK METRIK & TOTAL SALDO AKHIR REALTIME
        function hitungDanTampilkanStatistik() {
            const saldoAwalSistem = parseFloat(localStorage.getItem('base_personal_balance') || '0');
            const elFilter = document.getElementById('filter-bulan-stat');
            const filterBulanStat = elFilter ? elFilter.value : 'semua';

            let totalPemasukanBulanan = 0;
            let totalPengeluaranBulanan = 0;
            
            let akumulasiPemasukanSemuaWaktu = 0;
            let akumulasiPengeluaranSemuaWaktu = 0;

            dataLokalRemot.forEach(row => {
                const nilaiNominal = parseFloat(row.harga || 0) * parseInt(row.jumlah || 1);
                const isPemasukan = row.transaksi === true || row.transaksi === "true";

                // Akumulasi Semua Waktu
                if (isPemasukan) {
                    akumulasiPemasukanSemuaWaktu += nilaiNominal;
                } else {
                    akumulasiPengeluaranSemuaWaktu += nilaiNominal;
                }

                // Filter Periodik
                let laporBarisIni = false;
                const tanggalRaw = row.date || row.DATE;
                if (filterBulanStat === "semua") {
                    laporBarisIni = true;
                } else if (tanggalRaw) { 
                    const bagianTanggal = String(tanggalRaw).substring(0, 7); 
                    if (bagianTanggal === filterBulanStat) {
                        laporBarisIni = true;
                    }
                }

                if (laporBarisIni) {
                    if (isPemasukan) {
                        totalPemasukanBulanan += nilaiNominal;
                    } else {
                        totalPengeluaranBulanan += nilaiNominal;
                    }
                }
            });

            const selisihNetto = totalPemasukanBulanan - totalPengeluaranBulanan;
            const saldoDompetAkhirReal = saldoAwalSistem + akumulasiPemasukanSemuaWaktu - akumulasiPengeluaranSemuaWaktu;

            const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(angka);

            if(document.getElementById('total-saldo-display')) document.getElementById('total-saldo-display').innerText = formatRupiah(saldoDompetAkhirReal);
            if(document.getElementById('stat-pemasukan')) document.getElementById('stat-pemasukan').innerText = formatRupiah(totalPemasukanBulanan);
            if(document.getElementById('stat-pengeluaran')) document.getElementById('stat-pengeluaran').innerText = formatRupiah(totalPengeluaranBulanan);
            if(document.getElementById('stat-selisih')) document.getElementById('stat-selisih').innerText = formatRupiah(selisihNetto);
            
            const elSelisih = document.getElementById('stat-selisih');
            if (elSelisih) {
                if (selisihNetto < 0) {
                    elSelisih.className = "text-base font-bold text-rose-600";
                } else if (selisihNetto > 0) {
                    elSelisih.className = "text-base font-bold text-emerald-600";
                } else {
                    elSelisih.className = "text-base font-bold text-stone-900";
                }
            }
        }

        // TAMPILKAN TABEL MULTI-FILTER PENCARIAN
        function tampilkanTabel() {
            const tbody = document.getElementById('tabel-body');
            if (!tbody) return;
            
            const kataKunci = document.getElementById('cari-input') ? document.getElementById('cari-input').value.toLowerCase().trim() : '';

            const dataTerfilter = dataLokalRemot.filter(row => {
                const tanggalRaw = row.date || row.DATE || '';
                const cocokNama = (row.nama_barang || '').toLowerCase().includes(kataKunci);
                const cocokTgl = String(tanggalRaw).toLowerCase().includes(kataKunci); 
                return cocokNama || cocokTgl;
            });

            if(document.getElementById('info-baris')) {
                document.getElementById('info-baris').innerText = `Menampilkan ${dataTerfilter.length} dari ${dataLokalRemot.length} catatan terdaftar`;
            }

            if (dataTerfilter.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-stone-400">Tidak ada data transaksi yang cocok.</td></tr>`;
                return;
            }

            let html = "";
            dataTerfilter.forEach(row => {
                const total = parseFloat(row.harga || 0) * parseInt(row.jumlah || 1);
                const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(angka);
                
                const isPemasukan = row.transaksi === true || row.transaksi === "true";
                const tanggalTampil = row.date || row.DATE || '-';

                html += `
                    <tr class="hover:bg-stone-50/50 transition">
                        <td class="px-6 py-4 font-semibold text-stone-800">${row.nama_barang || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-center text-stone-500">${row.jumlah || 1}x</td>
                        <td class="px-6 py-4 whitespace-nowrap text-center">
                            <span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${isPemasukan ? 'bg-emerald-50 text-emerald-700' : 'bg-rose-50 text-rose-700'}">
                                ${isPemasukan ? 'PEMASUKAN' : 'PENGELUARAN'}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right font-mono font-bold ${isPemasukan ? 'text-emerald-600' : 'text-rose-600'}">
                            ${isPemasukan ? '+' : '-'}${formatRupiah(total)}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-stone-400">${tanggalTampil}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-center kol-aksi ${modeAksiAktif ? '' : 'hidden'}">
                            <div class="flex items-center justify-center gap-3">
                                <button onclick="bukaModalEdit('${row.id}')" class="text-stone-400 hover:text-amber-600 transition" title="Edit">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
                                    </svg>
                                </button>
                                <button onclick="hapusTransaksi('${row.id}')" class="text-stone-400 hover:text-rose-600 transition" title="Hapus">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
            updateVisibilitasKolomAksi();
        }

        function toggleAksiMode() {
            modeAksiAktif = !modeAksiAktif;
            updateVisibilitasKolomAksi();
        }

        function updateVisibilitasKolomAksi() {
            const thAksi = document.getElementById('th-aksi');
            const tdAksi = document.querySelectorAll('.kol-aksi');
            
            if (thAksi) {
                if (modeAksiAktif) {
                    thAksi.classList.remove('hidden');
                    tdAksi.forEach(el => el.classList.remove('hidden'));
                } else {
                    thAksi.classList.add('hidden');
                    tdAksi.forEach(el => el.classList.add('hidden'));
                }
            }
        }

        function bukaModalSaldoDasar() {
            if(document.getElementById('input-nominal-saldo')) {
                document.getElementById('input-nominal-saldo').value = localStorage.getItem('base_personal_balance') || '0';
            }
            if(document.getElementById('modal-saldo-dasar')) {
                document.getElementById('modal-saldo-dasar').classList.remove('hidden');
            }
        }

        function tutupModalSaldoDasar() {
            if(document.getElementById('modal-saldo-dasar')) {
                document.getElementById('modal-saldo-dasar').classList.add('hidden');
            }
        }

        function simpanSaldoDasarManual() {
            const nilaiSaldo = document.getElementById('input-nominal-saldo') ? document.getElementById('input-nominal-saldo').value : '0';
            localStorage.setItem('base_personal_balance', nilaiSaldo || '0');
            tutupModalSaldoDasar();
            hitungDanTampilkanStatistik();
        }

        function bukaModalTransaksi() {
            if(document.getElementById('modal-title')) document.getElementById('modal-title').innerText = "Catat Mutasi Baru";
            if(document.getElementById('form-transaksi')) delete document.getElementById('form-transaksi').dataset.editId;
            if(document.getElementById('form-date')) document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            if(document.getElementById('modal-transaksi')) document.getElementById('modal-transaksi').classList.remove('hidden');
        }

        function bukaModalEdit(id) {
            const item = dataLokalRemot.find(d => d.id == id);
            if (!item) return;

            if(document.getElementById('modal-title')) document.getElementById('modal-title').innerText = "Edit Catatan Keuangan";
            if(document.getElementById('form-transaksi')) document.getElementById('form-transaksi').dataset.editId = id;
            
            if(document.getElementById('form-date')) document.getElementById('form-date').value = item.date || item.DATE || ''; 
            if(document.getElementById('form-nama')) document.getElementById('form-nama').value = item.nama_barang || '';
            if(document.getElementById('form-jenis')) document.getElementById('form-jenis').value = item.transaksi === false || item.transaksi === "false" ? "false" : "true";
            if(document.getElementById('form-harga')) document.getElementById('form-harga').value = item.harga || 0;
            if(document.getElementById('form-jumlah')) document.getElementById('form-jumlah').value = item.jumlah || 1;

            if(document.getElementById('modal-transaksi')) document.getElementById('modal-transaksi').classList.remove('hidden');
        }

        function tutupModalTransaksi() {
            if(document.getElementById('modal-transaksi')) document.getElementById('modal-transaksi').classList.add('hidden');
            if(document.getElementById('form-transaksi')) {
                document.getElementById('form-transaksi').reset();
                delete document.getElementById('form-transaksi').dataset.editId;
            }
        }

        async function simpanTransaksi(e) {
            e.preventDefault();
            if (!_supabase) return;

            const inputDate = document.getElementById('form-date').value; 
            const nama_barang = document.getElementById('form-nama').value;
            const transaksi = document.getElementById('form-jenis').value === "true";
            const harga = parseFloat(document.getElementById('form-harga').value || '0');
            const jumlah = parseInt(document.getElementById('form-jumlah').value || '1');
            
            const dataPayload = { 
                nama_barang, 
                transaksi, 
                harga, 
                jumlah,
                date: inputDate // Menggunakan key kecil standar 'date'
            };
            
            const editId = document.getElementById('form-transaksi').dataset.editId;

            try {
                if (editId) {
                    const { error } = await _supabase
                        .from('catatan_keuangan')
                        .update(dataPayload)
                        .eq('id', editId);
                    if (error) throw error;
                } else {
                    const { error } = await _supabase
                        .from('catatan_keuangan')
                        .insert([dataPayload]);
                    if (error) throw error;
                }

                tutupModalTransaksi();
                await ambilData();

            } catch (err) {
                alert("Gagal memproses data: " + err.message);
            }
        }

        async function hapusTransaksi(id) {
            if (!_supabase || !confirm("Apakah Anda yakin ingin menghapus catatan keuangan ini?")) return;
            try {
                const { error } = await _supabase
                    .from('catatan_keuangan')
                    .delete()
                    .eq('id', id);
                
                if (error) throw error;
                await ambilData();
            } catch (err) {
                alert("Gagal menghapus data: " + err.message);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            ambilData();
        });
    </script>
