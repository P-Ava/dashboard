<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Three.js Cube Joystick</title>
  <style>
    body { margin:0; overflow:hidden; }
    #joystick {
      position: fixed;
      left: 30px;
      bottom: 30px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      touch-action: none;
    }
    #stick {
      position: absolute;
      left: 40px;
      top: 40px;
      width: 20px;
      height: 10px;
      border-radius: 50%;
      background-color: rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>

<div id="joystick">
  <div id="stick"></div>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.179.1/build/three.module.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let cube;

function init() {
  // Create the cube and plane
  const geometry = new THREE.BoxGeometry();
  const material = new THREE.MeshNormalMaterial();

  cube = new THREE.Mesh(geometry, material);
  scene.add(cube);

  const planeGeometry = new THREE.PlaneGeometry(50, 50);
  const planeMaterial = new THREE.MeshBasicMaterial({color:0x444444});
  plane = new THREE.Mesh(planeGeometry, planeMaterial);
  plane.rotation.x = -Math.PI/2;
  plane.position.y = -1;
  scene.add(plane);

  // Add event listeners
  window.addEventListener('keydown', e => {
    cube.position.x += (e.key.toLowerCase() === 'w') ? 0.05 : 0;
    cube.position.z += (e.key.toLowerCase() === 's') ? 0.05 : 0;
  });

  window.addEventListener('keyup', e => {
    cube.position.x -= (e.key.toLowerCase() === 'w') ? 0.05 : 0;
    cube.position.z -= (e.key.toLowerCase() === 's') ? 0.05 : 0;
  });

  document.getElementById('joystick').addEventListener('pointerdown', () => {
    dragging = true;
  });

  window.addEventListener('pointerup', () => {
    dragging = false;
    moveX = 0;
    moveZ = 0;
    stick.style.left='40px';
    stick.style.top='40px';
  });

  window.addEventListener('pointermove', (e) => {
    if (!dragging) return;

    const rect = document.getElementById('joystick').getBoundingClientRect();
    const cx = rect.width / 2;
    const cy = rect.height / 2;

    let x = e.clientX - rect.left - cx;
    let y = e.clientY - rect.top - cy;

    const max = 20;
    const len = Math.hypot(x, y);

    if (len > max) {
      x = x / len * max;
      y = y / len * max;
    }

    document.getElementById('stick').style.left = `${x}px`;
    document.getElementById('stick').style.top = `${y}px`;

    moveX = x / max;
    moveZ = y / max;
  });

  // Set initial camera position
  camera.position.x = cube.position.x;
  camera.position.z = cube.position.z + 8;
  camera.lookAt(cube.position);

  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

init();

function animate() {
  requestAnimationFrame(animate);

  if (keys['a']) cube.position.x -= 0.01;
  if (keys['d']) cube.position.x += 0.01;
  if (keys['w']) cube.position.z -= 0.01;
  if (keys['s']) cube.position.z += 0.01;

  camera.position.x = cube.position.x;
  camera.position.z = cube.position.z + 8;
  camera.lookAt(cube.position);

  renderer.render(scene, camera);
}

</script>

</body>
</html>
