<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P-AVA World</title>

<style>
html,body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#202124;
}

#ui{
position:absolute;
left:20px;
top:20px;
width:240px;
background:rgba(20,20,20,.75);
backdrop-filter:blur(12px);
border-radius:15px;
padding:15px;
color:white;
z-index:100;
}

.bar{
height:10px;
background:#444;
border-radius:10px;
overflow:hidden;
margin-bottom:10px;
}

.fill{
height:100%;
background:#55dd88;
width:75%;
}

#chat{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:420px;
background:rgba(30,30,30,.75);
padding:10px;
border-radius:15px;
display:flex;
gap:10px;
}

#chat input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
}

#chat button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
}

canvas{
display:block;
}
</style>
</head>
<body>

<div id="ui">

<h2>Stickman</h2>

HP

<div class="bar">
<div class="fill"></div>
</div>

Energi

<div class="bar">
<div class="fill" style="width:60%"></div>
</div>

Rp 25.000.000

</div>

<div id="chat">

<input placeholder="Chat AI...">

<button>Kirim</button>

</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.165/build/three.module.js';

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xcfd8dc);

const camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const light=new THREE.HemisphereLight(0xffffff,0x666666,2);
scene.add(light);

const dir=new THREE.DirectionalLight(0xffffff,2);
dir.position.set(5,10,7);
scene.add(dir);

const floor=new THREE.Mesh(
new THREE.PlaneGeometry(20,20),
new THREE.MeshStandardMaterial({
color:0xb0bec5
})
);

floor.rotation.x=-Math.PI/2;
scene.add(floor);

const wallMat=new THREE.MeshStandardMaterial({
color:0xeeeeee
});

function wall(x,z,rx){

const w=new THREE.Mesh(
new THREE.BoxGeometry(20,4,.2),
wallMat
);

w.position.set(x,2,z);
w.rotation.y=rx;
scene.add(w);

}

wall(0,-10,0);
wall(0,10,0);
wall(-10,0,Math.PI/2);
wall(10,0,Math.PI/2);

const player=new THREE.Group();

const body=new THREE.Mesh(
new THREE.CylinderGeometry(.3,.3,1.2),
new THREE.MeshStandardMaterial({
color:0x3f51b5
})
);

body.position.y=1;
player.add(body);

const head=new THREE.Mesh(
new THREE.SphereGeometry(.35),
new THREE.MeshStandardMaterial({
color:0xffddb0
})
);

head.position.y=2;
player.add(head);

scene.add(player);

const keys={};

window.onkeydown=e=>keys[e.key.toLowerCase()]=true;
window.onkeyup=e=>keys[e.key.toLowerCase()]=false;
//berjalan//
function update(){

let speed = 0.08;

if(keys["w"]){
    player.translateZ(-speed);}
if(keys["s"]){
    player.translateZ(speed);}
if(keys["a"]){
    player.rotation.y += 0.05;}
if(keys["d"]){
    player.rotation.y -= 0.05;}
//kamera//
const cameraOffset = new THREE.Vector3(0,2.5,4);
  cameraOffset.applyQuaternion(player.quaternion);
const desiredCameraPosition =
  player.position.clone().add(cameraOffset);
  camera.position.lerp(desiredCameraPosition,0.08);
  const target = player.position.clone();
  target.y += 1.5;
  camera.lookAt(target);
  renderer.render(scene,camera);
  requestAnimationFrame(update);

}

update();

</script>

</body>
</html>
